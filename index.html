<script>
  // Hiệu ứng typewriter LOOP cho câu mô tả
  document.addEventListener('DOMContentLoaded', function() {
    const text = "2011, đếch biết sợ và thích bị ăn đòn.";
    const excerptEl = document.querySelector('.excerpt');
    
    if (!excerptEl) {
      console.log('Không tìm thấy .excerpt');
      return;
    }
    
    let index = 0;
    let isDeleting = false;
    
    // Xóa nội dung gốc
    excerptEl.textContent = '';
    
    function typeLoop() {
      if (isDeleting) {
        // Đang xóa
        if (index > 0) {
          excerptEl.textContent = text.substring(0, index - 1);
          index--;
          setTimeout(typeLoop, 50);
        } else {
          // Xóa xong, chuyển sang gõ lại
          isDeleting = false;
          setTimeout(typeLoop, 500);
        }
      } else {
        // Đang gõ
        if (index <= text.length) {
          excerptEl.textContent = text.substring(0, index);
          index++;
          setTimeout(typeLoop, 100);
        } else {
          // Gõ xong, chờ 2 giây rồi xóa
          isDeleting = true;
          setTimeout(typeLoop, 2000);
        }
      }
    }
    
    typeLoop();
  });
</script>
<script>
  // Hiệu ứng title typewriter (gõ → xóa → gõ câu khác)
  const titles = [
    "Lion dep chai pro vip 36"
  ];
  
  let phraseIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  
  function typeTitle() {
    const currentPhrase = titles[phraseIndex];
    
    if (isDeleting) {
      document.title = currentPhrase.substring(0, charIndex - 1);
      charIndex--;
      if (charIndex === 0) {
        isDeleting = false;
        phraseIndex = (phraseIndex + 1) % titles.length;
        setTimeout(typeTitle, 0);
      } else {
        setTimeout(typeTitle, 300);
      }
    } else {
      document.title = currentPhrase.substring(0, charIndex + 1);
      charIndex++;
      if (charIndex === currentPhrase.length) {
        isDeleting = true;
        setTimeout(typeTitle, 300);
      } else {
        setTimeout(typeTitle, 300);
      }
    }
  }
  
  document.addEventListener('DOMContentLoaded', function() {
    document.title = "";
    typeTitle();
  });
</script>

  // Copy nội dung thật (ẩn dưới dấu ***)
  function copyRealText(elementId, btnElement) {
    const element = document.getElementById(elementId);
    const realText = element.getAttribute('data-real');
    
    navigator.clipboard.writeText(realText).then(function() {
      const originalText = btnElement.textContent;
      btnElement.textContent = '✅ Copied!';
      btnElement.style.background = 'rgba(0,200,0,0.3)';
      
      setTimeout(function() {
        btnElement.textContent = originalText;
        btnElement.style.background = 'rgba(255,255,255,0.15)';
      }, 1500);
    }).catch(function(err) {

    });
  }

<script>
  // Hiệu ứng 3D xoay theo chuột cho bảng thông tin
  (function() {
    const panel = document.querySelector('#infoPanel > div');
    if (!panel) return;
    
    let bounds = panel.getBoundingClientRect();
    
    window.addEventListener('resize', () => {
      bounds = panel.getBoundingClientRect();
    });
    
    panel.addEventListener('mousemove', function(e) {
      const x = e.clientX - bounds.left;
      const y = e.clientY - bounds.top;
      
      const xPercent = (x / bounds.width) * 100;
      const yPercent = (y / bounds.height) * 100;
      
      const xRotate = (50 - xPercent) / 5;
      const yRotate = (50 - yPercent) / 5;
      
      panel.style.transform = `perspective(1000px) rotateY(${xRotate}deg) rotateX(${-yRotate}deg) scale3d(1.02, 1.02, 1.02)`;
    });
    
    panel.addEventListener('mouseleave', function() {
      panel.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
    });
  })();
</script>
<script>
  // Kéo thả avatar di chuyển
  (function() {
    const avatar = document.querySelector('.avatar');
    if (!avatar) return;
    
    let isDragging = false;
    let startX, startY;
    let offsetX, offsetY;
    
    // Bắt đầu kéo (chuột)
    avatar.addEventListener('mousedown', function(e) {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      
      // Lấy vị trí hiện tại của avatar
      const rect = avatar.getBoundingClientRect();
      offsetX = startX - rect.left;
      offsetY = startY - rect.top;
      
      avatar.style.cursor = 'grabbing';
      avatar.style.transition = 'none';
      e.preventDefault();
    });
    
    // Di chuyển (chuột)
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      
      let newX = e.clientX - offsetX;
      let newY = e.clientY - offsetY;
      
      // Giới hạn trong màn hình
      const maxX = window.innerWidth - avatar.offsetWidth;
      const maxY = window.innerHeight - avatar.offsetHeight;
      newX = Math.min(Math.max(0, newX), maxX);
      newY = Math.min(Math.max(0, newY), maxY);
      
      avatar.style.position = 'fixed';
      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';
      avatar.style.margin = '0';
      avatar.style.zIndex = '1000';
    });
    
    // Thả chuột
    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        avatar.style.cursor = 'grab';
        avatar.style.transition = 'transform 0.2s';
      }
    });
    
    // Hỗ trợ chạm trên điện thoại
    avatar.addEventListener('touchstart', function(e) {
      const touch = e.touches[0];
      isDragging = true;
      startX = touch.clientX;
      startY = touch.clientY;
      
      const rect = avatar.getBoundingClientRect();
      offsetX = startX - rect.left;
      offsetY = startY - rect.top;
      
      avatar.style.transition = 'none';
      e.preventDefault();
    });
    
    document.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      
      const touch = e.touches[0];
      let newX = touch.clientX - offsetX;
      let newY = touch.clientY - offsetY;
      
      const maxX = window.innerWidth - avatar.offsetWidth;
      const maxY = window.innerHeight - avatar.offsetHeight;
      newX = Math.min(Math.max(0, newX), maxX);
      newY = Math.min(Math.max(0, newY), maxY);
      
      avatar.style.position = 'fixed';
      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';
      avatar.style.margin = '0';
      avatar.style.zIndex = '1000';
    });
    
    document.addEventListener('touchend', function() {
      isDragging = false;
      avatar.style.transition = 'transform 0.2s';
    });
    
    // Thêm cursor grab cho avatar
    avatar.style.cursor = 'grab';
    avatar.style.userSelect = 'none';
  })();
</script>
<script>
  (function() {
    const avatar = document.querySelector('.avatar');
    if (!avatar) {
      console.log('Không tìm thấy avatar');
      return;
    }
    
    let isDragging = false;
    let startX = 0, startY = 0;
    let initialLeft = 0, initialTop = 0;
    
    // Hàm lấy vị trí hiện tại của avatar
    function getAvatarPosition() {
      const rect = avatar.getBoundingClientRect();
      return { x: rect.left, y: rect.top };
    }
    
    // Bắt đầu kéo
    function onStart(e) {
      e.preventDefault();
      isDragging = true;
      
      // Lấy vị trí chuột/touch
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      const pos = getAvatarPosition();
      startX = clientX - pos.x;
      startY = clientY - pos.y;
      
      // Chuyển sang fixed positioning
      avatar.style.position = 'fixed';
      avatar.style.left = pos.x + 'px';
      avatar.style.top = pos.y + 'px';
      avatar.style.margin = '0';
      avatar.classList.add('dragging');
      
      console.log('Bắt đầu kéo tại:', pos.x, pos.y);
    }
    
    // Di chuyển
    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      
      const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
      const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
      
      let newX = clientX - startX;
      let newY = clientY - startY;
      
      // Giới hạn trong màn hình
      newX = Math.min(Math.max(0, newX), window.innerWidth - avatar.offsetWidth);
      newY = Math.min(Math.max(0, newY), window.innerHeight - avatar.offsetHeight);
      
      avatar.style.left = newX + 'px';
      avatar.style.top = newY + 'px';
    }
    
    // Kết thúc kéo
    function onEnd() {
      if (isDragging) {
        isDragging = false;
        avatar.classList.remove('dragging');
        console.log('Kết thúc kéo, vị trí:', avatar.style.left, avatar.style.top);
      }
    }
    
    // Gắn sự kiện chuột
    avatar.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    
    // Gắn sự kiện chạm (điện thoại)
    avatar.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    
    avatar.style.cursor = 'grab';
  })();
</script>

<script>
  (function() {
    const soundBtn = document.getElementById('soundBtn');
    const soundIcon = document.getElementById('soundIcon');
    let audioPlayer = document.getElementById('bgmusic');
    
    if (!audioPlayer) {
      audioPlayer = new Audio();
      audioPlayer.src = "music.mp3";
      audioPlayer.loop = true;
    }
    
    let isMuted = false;
    let lastVolume = 0.7;
    
    const SOUND_ON = "sound-on.png";
    const SOUND_OFF = "sound-off.png";
    
    // Mặc định bật âm
    soundIcon.src = SOUND_ON;
    audioPlayer.muted = false;
    audioPlayer.volume = 0.7;
    
    function toggleMute(e) {
      e.preventDefault();  // Ngăn delay trên mobile
      if (isMuted) {
        audioPlayer.muted = false;
        audioPlayer.volume = lastVolume;
        soundIcon.src = SOUND_ON;
      } else {
        lastVolume = audioPlayer.volume;
        audioPlayer.muted = true;
        audioPlayer.volume = 0;
        soundIcon.src = SOUND_OFF;
      }
      isMuted = !isMuted;
    }
    
    // Dùng cả click và touchstart để mobile phản hồi nhanh
    soundBtn.addEventListener('click', toggleMute);
    soundBtn.addEventListener('touchstart', toggleMute, { passive: false });
  })();
</script>

<script>
  // Hiệu ứng các ký tự ★ ✡ ❄ rơi từ khoảng không
  (function() {
    const rainContainer = document.getElementById('rainHeart');
    if (!rainContainer) return;
    
    // Mảng các ký tự muốn rơi
    const symbols = ['★', '✡︎', '❄︎'];
    
    function createSymbol() {
      const symbol = document.createElement('div');
      symbol.className = 'heart-fall';
      
      // Chọn ngẫu nhiên 1 trong 3 ký tự
      const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
      symbol.textContent = randomSymbol;
      symbol.style.color = '#ffffff';
      
      // Vị trí ngang ngẫu nhiên
      const leftPos = Math.random() * 100;
      symbol.style.left = leftPos + '%';
      
      // Kích thước ngẫu nhiên (8px - 20px)
      const size = 12 + Math.random() * 20;
      symbol.style.fontSize = size + 'px';
      
      // Tốc độ rơi ngẫu nhiên (4s - 8s)
      const duration = 4 + Math.random() * 4;
      symbol.style.animationDuration = duration + 's';
      
      rainContainer.appendChild(symbol);
      
      // Xóa sau khi rơi xong
      setTimeout(() => {
        if (symbol && symbol.remove) symbol.remove();
      }, (duration + 0.5) * 1000);
    }
    
    // Tạo mới mỗi 0.35 giây
    setInterval(createSymbol, 350);
    
    // Tạo 5 ký tự ban đầu
    for (let i = 0; i < 5; i++) {
      setTimeout(createSymbol, i * 80);
    }
  })();
</script>

<script>
  // Đợi trang tải xong rồi mới gán sự kiện đổi avatar
  document.addEventListener('DOMContentLoaded', function() {
    const avatars = ["avatar5.gif", "avatar3.gif", "avatar2.gif", "avatar1.gif", "avatar4.gif",]
    let currentIndex = 0;
    
    // Tìm avatar (thử nhiều selector)
    let avatarElement = document.querySelector('.avatar .image');
    if (!avatarElement) {
      avatarElement = document.querySelector('.avatar img');
    }
    
    if (avatarElement) {
      console.log("Đã tìm thấy avatar:", avatarElement);
      avatarElement.style.cursor = 'pointer';
      
      // Nếu là div .image (dùng background-image)
      if (avatarElement.tagName === 'DIV') {
        // Lấy ảnh hiện tại để xác định index
        const currentBg = avatarElement.style.backgroundImage;
        for (let i = 0; i < avatars.length; i++) {
          if (currentBg && currentBg.includes(avatars[i])) {
            currentIndex = i;
            break;
          }
        }
        
        avatarElement.addEventListener('click', function() {
          currentIndex = (currentIndex + 1) % avatars.length;
          this.style.backgroundImage = `url('${avatars[currentIndex]}')`;
          
          // Hiệu ứng
          this.style.transform = 'scale(0.95)';
          setTimeout(() => {
            this.style.transform = 'scale(1)';
          }, 150);
        });
      } 
      // Nếu là thẻ img
      else if (avatarElement.tagName === 'IMG') {
        avatarElement.addEventListener('click', function() {
          currentIndex = (currentIndex + 1) % avatars.length;
          this.src = avatars[currentIndex];
          
          this.style.transform = 'scale(0.95)';
          setTimeout(() => {
            this.style.transform = 'scale(1)';
          }, 150);
        });
      }
    } else {
      console.log("Không tìm thấy avatar element");
    }
  });
</script>
<script>
  // Hiệu ứng Typewriter cho tên
  document.addEventListener('DOMContentLoaded', function() {
    const nameElement = document.querySelector('.name');
    if (!nameElement) return;
    
    // Các thành phố Hàn Quốc
    const cities = [
      "Tokyo",
      "Seoul",
      "Busan", 
      "Incheon",
      "Daegu",
      "Daejeon",
      "Jeju"
    ];
    
    let cityIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    let currentText = "Thái tử ";
    
    function typeEffect() {
      const targetCity = cities[cityIndex];
      
      if (isDeleting) {
        // Xóa tên thành phố
        if (charIndex > 0) {
          charIndex--;
          nameElement.textContent = currentText + targetCity.substring(0, charIndex);
          setTimeout(typeEffect, 50);
        } else {
          // Xóa xong, chuyển sang thành phố tiếp theo
          isDeleting = false;
          cityIndex = (cityIndex + 1) % cities.length;
          setTimeout(typeEffect, 300);
        }
      } else {
        // Gõ tên thành phố
        if (charIndex < targetCity.length) {
          charIndex++;
          nameElement.textContent = currentText + targetCity.substring(0, charIndex);
          setTimeout(typeEffect, 100);
        } else {
          // Gõ xong, chờ rồi xóa
          isDeleting = true;
          setTimeout(typeEffect, 1500);
        }
      }
    }
    
    // Khởi tạo
    nameElement.textContent = currentText + cities[0].charAt(0);
    charIndex = 1;
    typeEffect();
  });
</script>
